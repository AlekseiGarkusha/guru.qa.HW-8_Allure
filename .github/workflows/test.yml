name: Test

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          path: project-src

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Setup Selenoid
        uses: Xotabu4/selenoid-github-action@v2
        with:
          selenoid-image: selenoid/vnc:latest
          selenoid-ui-image: aerokube/selenoid-ui:latest

      - name: Run tests
        working-directory: project-src
        run: ./gradlew clean test -Dselenide.remote=http://localhost:4444/wd/hub

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Check Allure results exist
        run: |
          if [ ! -d "project-src/build/allure-results" ]; then
            echo "Allure results not generated!"
            exit 1
          fi

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@1.0.0
        if: always()
        with:
          gh_pages: gh-pages
          allure_results: project-src/build/allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history
          BUILD_DIR: allure-history