plugins {
    id 'java'
    id 'io.qameta.allure' version '3.0.2'
}

group = 'org.example'
version = '1.0-SNAPSHOT'


allure {
    report {
        version.set("2.20.0")
    }
    adapter {
        aspectjWeaver.set(true)
        frameworks {
            junit5 {
                adapterVersion.set("2.20.0")
            }
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation("org.junit.jupiter:junit-jupiter:5.10.2")
    testImplementation("io.qameta.allure:allure-junit5:2.20.0")
    implementation("com.codeborne:selenide:7.15.0")
    implementation("io.qameta.allure:allure-selenide:2.33.0")

}

tasks.register('smoke', Test) {
    useJUnitPlatform {
        includeTags("smoke")
    }

    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        exceptionFormat "full"
    }

    shouldRunAfter test
}

test {
    useJUnitPlatform()
    systemProperties(System.getProperties())
}
